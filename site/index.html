<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>0xClaw</title>
    <style>
      :root {
        --bg: rgb(14, 15, 14);
        --surface: rgba(239, 234, 216, 0.03);
        --surfaceElevated: rgba(239, 234, 216, 0.06);
        --text: rgb(239, 234, 216);
        --textMuted: rgb(165, 165, 156);
        --accent: rgb(143, 169, 143);
        --border: rgba(239, 234, 216, 0.18);

        --fontBody: 'DM Sans', system-ui, sans-serif;
        --fontDisplay: 'Libre Baskerville', Georgia, serif;

        --h1: clamp(64px, 8vw, 96px);
        --body: 18px;
        --small: 14px;

        --lhDisplay: 1.08;
        --lhBody: 1.5;
        --lhSmall: 1.4;

        --regular: 400;
        --medium: 500;
        --semibold: 600;

        --base: 8px;
        --sectionY: 96px;
        --sectionX: 24px;
        --componentGap: 24px;
        --stackGap: 16px;
        --cardPad: 24px;

        --radiusSm: 8px;
        --radiusMd: 16px;

        --shadowCard: 0 8px 24px rgba(0,0,0,0.32);
        --shadowHover: 0 10px 30px rgba(0,0,0,0.38);

        --maxWidth: 1200px;
        --navH: 62px;
      }

      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--fontBody);
        font-size: var(--body);
        line-height: var(--lhBody);
      }
      a { color: inherit; text-decoration: none; }

      .container {
        width: min(var(--maxWidth), 100%);
        margin-inline: auto;
        padding-inline: var(--sectionX);
      }

      .nav {
        position: sticky;
        top: 0;
        z-index: 20;
        height: var(--navH);
        border-bottom: 1px solid var(--border);
        background: rgba(14, 15, 14, 0.84);
        backdrop-filter: blur(6px);
      }
      .nav-inner {
        height: var(--navH);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .wordmark {
        font-family: var(--fontDisplay);
        font-size: 22px;
        font-weight: var(--regular);
        letter-spacing: -0.01em;
      }
      .nav-links {
        display: flex;
        align-items: center;
        gap: var(--stackGap);
        font-size: var(--small);
        color: var(--textMuted);
      }
      .link-btn {
        min-height: 34px;
        padding: 0 12px;
        border: 1px solid var(--border);
        border-radius: var(--radiusSm);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: var(--text);
        background: var(--surface);
      }

      .hero {
        padding-top: var(--sectionY);
        padding-bottom: var(--sectionY);
      }
      .hero-layout {
        display: grid;
        align-content: start;
        gap: var(--componentGap);
      }
      .hero-top {
        max-width: 980px;
      }
      .hero-mark {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin-bottom: var(--stackGap);
        color: var(--textMuted);
        font-size: var(--small);
      }
      .hero-mark-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        border: 1px solid var(--border);
        background: var(--surfaceElevated);
      }
      h1 {
        margin: 0;
        font-family: var(--fontDisplay);
        font-size: var(--h1);
        line-height: var(--lhDisplay);
        font-weight: var(--regular);
        letter-spacing: -0.01em;
        text-wrap: balance;
      }
      .sub {
        margin-top: var(--stackGap);
        color: var(--textMuted);
        font-size: var(--body);
      }
      .meta {
        margin-top: calc(var(--stackGap) / 2);
        color: var(--accent);
        font-size: var(--small);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .hero-cards {
        margin-top: var(--componentGap);
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: var(--componentGap);
        max-width: 980px;
      }
      .card {
        border: 1px solid var(--border);
        border-radius: var(--radiusMd);
        padding: var(--cardPad);
        background: var(--surface);
        box-shadow: var(--shadowCard);
      }
      .hero-cards .card {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: var(--componentGap);
      }
      .card:hover {
        background: var(--surfaceElevated);
        box-shadow: var(--shadowHover);
      }
      .card-title {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 18px;
        font-weight: var(--medium);
        color: var(--text);
        white-space: nowrap;
      }
      .card-copy {
        margin: 0;
        font-size: var(--small);
        color: var(--textMuted);
        line-height: var(--lhSmall);
        text-align: right;
      }

      @media (max-width: 860px) {
        .hero-layout {
          min-height: auto;
          gap: var(--componentGap);
        }
        .hero-cards {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header class="nav">
      <div class="container nav-inner">
        <div class="wordmark">0xClaw</div>
        <nav class="nav-links" aria-label="Primary">
          <a href="../README.md">Docs</a>
          <a class="link-btn" href="https://github.com/wrensignal/0xClaw" target="_blank" rel="noreferrer">GitHub</a>
        </nav>
      </div>
    </header>

    <main>
      <section class="hero">
        <div class="container hero-layout">
          <div class="hero-top">
            <div class="hero-mark"><span class="hero-mark-dot"></span><span>Quiet mode</span></div>
            <h1>Your Agents Memecoin Trading Stack.</h1>
            <p class="sub">Open source. Private inference. Paper mode by default.</p>
          </div>

          <div class="hero-cards">
            <article class="card">
              <div class="card-title">◉ 0xClaw + Railway</div>
              <p class="card-copy">One-click deploy. Safe defaults. Recommended.</p>
            </article>
            <article class="card">
              <div class="card-title">◎ Self-hosted</div>
              <p class="card-copy">Clone, configure, full control.</p>
            </article>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
